<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFC Restaurant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:linear-gradient(45deg,#d60000,#ff6600);
text-align:center;
padding:25px;
}

header h1{
font-size:40px;
}

header p{
font-size:18px;
}

.banner{
text-align:center;
padding:20px;
}

.banner img{
width:90%;
max-width:900px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.section{
padding:20px;
}

.section h2{
color:#ffcc00;
margin-bottom:15px;
font-size:30px;
}

.card{
background:#222;
padding:15px;
margin:10px 0;
border-radius:12px;
display:flex;
justify-content:space-between;
font-size:20px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
background:#000;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>🍔 GFC RESTAURANT</h1>
<p>Good Food • Good Mood</p>
<p>📞 9956985622</p>
</header>

<div class="banner">
<img src="menu.jpg" alt="GFC Menu">
</div>

<div class="section">
<h2>Popular Items</h2>

<div class="card">
<span>Paneer Burger</span>
<span>₹50</span>
</div>

<div class="card">
<span>Veg Burger</span>
<span>₹40</span>
</div>

<div class="card">
<span>Paneer Pizza</span>
<span>₹160 - ₹280</span>
</div>

<div class="card">
<span>Masala Dosa</span>
<span>₹60</span>
</div>

<div class="card">
<span>Banana Shake</span>
<span>₹60</span>
</div>

</div>

<a class="whatsapp" href="https://wa.me/919956985622">
Order on WhatsApp
</a>

<footer>
© 2026 GFC Restaurant
</footer>

</html>
