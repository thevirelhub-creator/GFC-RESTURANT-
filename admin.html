<!DOCTYPE html>
<html>
<head>
<title>GFC Admin Panel</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  font-size:32px;
  font-weight:700;
  margin-bottom:20px;
}

.card,
.order-card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.stat-card{
  border-radius:15px;
  padding:20px;
  color:white;
  font-weight:600;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.blue{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.orange{
  background:linear-gradient(135deg,#f59e0b,#d97706);
}

.green{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.red{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

button{
  background:#ff4d4d;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  transform:translateY(-2px);
  transition:0.3s;
}

.order-card p,
.order-card h3{
  color:white;
}

.order-card b{
  color:#00e5ff;
  font-size:20px;
  font-weight:700;
}

.order-card p{
  font-size:18px;
  color:#ffffff;
  line-height:1.8;
}

.order-card h3{
  font-size:24px;
  color:#ffffff;
}

.order{
  background:rgba(255,255,255,0.12) !important;
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.order p,
.order h3{
  color:white !important;
}
.order-card{
  font-size:18px;
}
.order b{
  color:#ffd54f;
}
.order{
  background:rgba(255,255,255,0.15) !important;
  color:#ffffff !important;
}

.order p,
.order h3,
.order span{
  color:#ffffff !important;
}
.order-card b{
  color:#ffffff;
  font-size:20px;
  font-weight:700;
}

.order-card p{
  font-size:18px;
  color:#ffffff;
  line-height:1.8;
}

.order-card h3{
  font-size:24px;
  color:#ffffff;
  font-weight:700;
}
  
</style>
</head>

<body>

<h1>🍔 GFC Restaurant Orders</h1>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin:20px 0;">
  
  <div style="background:#2196f3;color:white;padding:15px;border-radius:10px;flex:1;">
    <h3>Total Orders</h3>
    <h2 id="totalOrders">0</h2>
  </div>

  <div style="background:#ff9800;color:white;padding:15px;border-radius:10px;flex:1;">
    <h3>Pending</h3>
    <h2 id="pendingOrders">0</h2>
  </div>

  <div style="background:#4caf50;color:white;padding:15px;border-radius:10px;flex:1;">
    <h3>Delivered</h3>
    <h2 id="deliveredOrders">0</h2>
  </div>

  <div style="background:#d60000;color:white;padding:15px;border-radius:10px;flex:1;">
    <h3>Total Sales</h3>
    <h2 id="totalSales">₹0</h2>
  </div>

</div>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
 getFirestore,
 collection,
 getDocs,
 updateDoc,
 deleteDoc,
 doc,
 onSnapshot
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyAnoH7FODacQhEkSkH57rykzHj8Ma93r74",
authDomain: "gfc-restaurant-51bb8.firebaseapp.com",
projectId: "gfc-restaurant-51bb8",
storageBucket: "gfc-restaurant-51bb8.firebasestorage.app",
messagingSenderId: "59057512480",
appId: "1:59057512480:web:45d9dcd26a36048cd99c45"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const querySnapshot = await getDocs(collection(db,"orders"));

let html = "";
let totalOrders = 0;
let pendingOrders = 0;
let deliveredOrders = 0;
let totalSales = 0;

querySnapshot.forEach((doc)=>{

let o = doc.data();
totalOrders++;

if(o.status=="Pending"){
pendingOrders++;
}

if(o.status=="Delivered"){
deliveredOrders++;
}

totalSales += Number(o.totalBill || 0);

html += `
<div class="order-card">

<h3>🆔 Order</h3>

<p><b>Order ID:</b> ${o.orderId || "N/A"}</p>
<p><b>Name:</b> ${o.customerName || "N/A"}</p>
<p><b>Mobile:</b> ${o.mobile || "N/A"}</p>
<p><b>Address:</b> ${o.address || "N/A"}</p>
<p><b>Items:</b> ${o.totalItems || 0}</p>
<p><b>Total:</b> ₹${o.totalBill || 0}</p>
<p><b>Date:</b> ${o.orderDate || ""}</p>
<p><b>Time:</b> ${o.orderTime || ""}</p>

<p>
<b>Status:</b>
<span id="status-${doc.id}">
${o.status}
</span>
</p>

<button onclick="changeStatus('${doc.id}','Preparing')">
🟠 Preparing
</button>

<button onclick="changeStatus('${doc.id}','Delivered')">
🟢 Delivered
</button>

<button onclick="deleteOrder('${doc.id}')">
❌ Delete
</button>

</div>
`;



});
document.getElementById("totalOrders").innerText = totalOrders;
document.getElementById("pendingOrders").innerText = pendingOrders;
document.getElementById("deliveredOrders").innerText = deliveredOrders;
document.getElementById("totalSales").innerText = "₹" + totalSales;
document.getElementById("orders").innerHTML = html;
window.changeStatus = async function(orderId,newStatus){

await updateDoc(
doc(db,"orders",orderId),
{
status:newStatus
}
);

document.getElementById(
"status-"+orderId
).innerText = newStatus;

alert("Status Updated Successfully");
}
window.deleteOrder = async function(orderId){

try{

console.log("Deleting:", orderId);

if(confirm("Delete this order?")){

await deleteDoc(
doc(db,"orders",orderId)
);

alert("Order Deleted Successfully");

location.reload();

}

}catch(error){

alert("Delete Error: " + error.message);
console.log(error);

}

}
if(confirm("Delete this order?")){

await deleteDoc(
doc(db,"orders",orderId)
);

alert("Order Deleted Successfully");

location.reload();

}

}
let firstLoad = true;

onSnapshot(collection(db,"orders"), (snapshot) => {

  if(!firstLoad){

    alert("🔔 New Order Received!");

    const audio = new Audio(
      "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
    );

    audio.play();

    location.reload();

  }

  firstLoad = false;

});
</script>
<script>
if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="login.html";
}
</script>
</body>
</html>
