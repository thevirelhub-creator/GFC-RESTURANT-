<!DOCTYPE html>
<html>
<head>
<title>GFC Restaurant Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background-image:url("./1000317407.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:white;
    padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
font-size:38px;
text-shadow:0 0 20px #ff9800;
}

.logout{
background:linear-gradient(135deg,#ff3b30,#ff9800);
border:none;
padding:12px 18px;
border-radius:12px;
color:white;
font-weight:700;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
padding:20px;
border-radius:20px;
color:white;
font-weight:700;
}

.blue{
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.orange{
background:linear-gradient(135deg,#ff9800,#ff5722);
}

.green{
background:linear-gradient(135deg,#00c853,#64dd17);
}

.red{
background:linear-gradient(135deg,#ff1744,#d50000);
}

.order-card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-left:5px solid #ff9800;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.order-card p{
font-size:18px;
line-height:1.8;
}

.order-card b{
font-size:20px;
color:white;
}

button{
background:linear-gradient(135deg,#ff3b30,#ff9800);
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:700;
margin:5px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="header">

<h1>🍔 GFC Restaurant Admin</h1>

<button class="logout" onclick="logout()">
🚪 Logout
</button>

</div>

<div class="stats">

<div class="card blue">
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div>

<div class="card orange">
<h3>Pending</h3>
<h2 id="pendingOrders">0</h2>
</div>

<div class="card green">
<h3>Delivered</h3>
<h2 id="deliveredOrders">0</h2>
</div>

<div class="card red">
<h3>Total Sales</h3>
<h2 id="totalSales">₹0</h2>
</div>

</div>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
doc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAnoH7FODacQhEkSkH57rykzHj8Ma93r74",
authDomain: "gfc-restaurant-51bb8.firebaseapp.com",
projectId: "gfc-restaurant-51bb8",
storageBucket: "gfc-restaurant-51bb8.appspot.com",
messagingSenderId: "59057512480",
appId: "1:59057512480:web:45d9dcd26a36048cd99c45"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const querySnapshot = await getDocs(
collection(db,"orders")
);

let html = "";

let totalOrders = 0;
let pendingOrders = 0;
let deliveredOrders = 0;
let totalSales = 0;

querySnapshot.forEach((doc)=>{

let o = doc.data();

totalOrders++;

if(o.status==="Pending"){
pendingOrders++;
}

if(o.status==="Delivered"){
deliveredOrders++;
}

totalSales += Number(o.totalBill || 0);

html += `

<div class="order-card">

<h3>🆔 Order #${o.orderId || "N/A"}</h3>

<p><b>Name:</b> ${o.customerName || "N/A"}</p>

<p><b>Mobile:</b> ${o.mobile || "N/A"}</p>

<p><b>Address:</b> ${o.address || "N/A"}</p>

<p><b>Items:</b> ${o.totalItems || 0}</p>

<p><b>Total Bill:</b> ₹${o.totalBill || 0}</p>

<p><b>Date:</b> ${o.orderDate || "-"}</p>

<p><b>Time:</b> ${o.orderTime || "-"}</p>

<p>
<b>Status:</b>
<span id="status-${doc.id}">
${o.status || "Pending"}
</span>
</p>

<button onclick="changeStatus('${doc.id}','Preparing')">
🟠 Preparing
</button>

<button onclick="changeStatus('${doc.id}','Delivered')">
🟢 Delivered
</button>

<button onclick="deleteOrder('${doc.id}')">
❌ Delete
</button>

</div>

`;

});

document.getElementById("totalOrders").innerText = totalOrders;
document.getElementById("pendingOrders").innerText = pendingOrders;
document.getElementById("deliveredOrders").innerText = deliveredOrders;
document.getElementById("totalSales").innerText = "₹" + totalSales;

document.getElementById("orders").innerHTML = html;

window.changeStatus = async function(orderId,newStatus){

try{

await updateDoc(
doc(db,"orders",orderId),
{
status:newStatus
}
);

document.getElementById(
"status-"+orderId
).innerText = newStatus;

alert("✅ Status Updated");

}catch(error){

alert(error.message);

}

}

window.deleteOrder = async function(orderId){

try{

if(!confirm("Delete this order?")) return;

await deleteDoc(
doc(db,"orders",orderId)
);

alert("Delete Success");

location.reload();

}catch(error){

alert("❌ " + error.message);

}

}

let firstLoad = true;

onSnapshot(collection(db,"orders"),()=>{

if(!firstLoad){

 console.log("Orders Updated");

}

firstLoad = false;

});

</script>

<script>

if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="login.html";
}

function logout(){

localStorage.removeItem("adminLoggedIn");

window.location.href="login.html";

}

</script>

</body>
</html>
